    <CENTER><highlight><BOLD>%QUESTNAME%
    <EMPTY>
  quest-description: '<main>クエストの説明: <unimportant>%QUESTDESCRIPTION%'
  quest-already-accepted: <error>のクエストは既に承認されています。
  quest-failed: |2

    <CENTER><negative>[Quest Failed]
    <CENTER><highlight><BOLD>%QUESTNAME%
    <EMPTY>
  quest-aborted: ''
  quest-completed-and-rewards-given: |2

