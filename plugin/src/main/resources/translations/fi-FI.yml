      set: <main>Tehtäväpisteesi on asetettu arvoon <highlight>%NEWQUESTPOINTSAMOUNT%</highlight>.
      add: <highlight>+%QUESTPOINTSTOADD% <success>tehtäväpistettä!
      remove: <highlight>-%QUESTPOINTSTOREMOVE% <negative>tehtäväpistettä!
  no-quests-accepted: <error>Näyttää siltä, ettei sinulla ole yhtään aktiivista tehtävää!
