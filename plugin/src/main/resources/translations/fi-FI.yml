    <CENTER><main>[Tehtävä hyväksytty]

    <CENTER><highlight><BOLD>%QUESTNAME%

    <EMPTY>

    '
  quest-description: '<main>Tehtävän kuvaus: <unimportant>%QUESTDESCRIPTION%'
  quest-already-accepted: <error>Tehtävä on jo hyväksytty.
  quest-failed: '

    <CENTER><negative>[Tehtävä epäonnistui]

    <CENTER><highlight><BOLD>%QUESTNAME%

    <EMPTY>

    '
  quest-aborted: ''
  quest-completed-and-rewards-given: '

    <CENTER><positive>[Tehtävä suoritettu]

    <CENTER><highlight><BOLD>%QUESTNAME%

    <EMPTY>

    '
  quest-completed-rewards-prefix: '    <highlight>Palkinnot:'
  quest-completed-rewards-rewardformat: '    <highlight> - <unimportant>%reward%'
  quest-completed-rewards-suffix: <EMPTY>
