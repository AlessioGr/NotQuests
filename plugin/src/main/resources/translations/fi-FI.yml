  abort-disabled: <error>Tehtävän <highlight>%QUESTNAME%</highlight> keskeyttäminen on poistettu käytöstä.
  quest-not-active-error: '<error>Virhe: <highlight>%QUESTNAME%</highlight> ei ole aktiivinen tehtävä!'
  force-add-active-quest-accepted: <success>Tehtävä hyväksyttiin onnistuneesti (Pakotettu).
  add-active-quest-player-object-not-found: '<warn>Virhe: Pelaajaobjektia ei löytynyt. Ilmoita tästä lisäosan kehittäjälle.'
