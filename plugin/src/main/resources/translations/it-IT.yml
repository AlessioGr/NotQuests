    create-invalid-characters: <error>Il nome del profilo fornito contiene caratteri non validi.
    created-successfully: <success>Hai creato con successo il profilo <highlight>%NEWPROFILENAME%</highlight>! Per passare ad esso, usa <highlight2>/nq profiles change %NEWPROFILENAME%</highlight2>
