    hidden: <highlight>%OBJECTIVEID%.</highlight> <unimportant><BOLD>[NASCOSTO]
    description: '    <veryUnimportant>└─ <unimportant>Descrizione: <main>%OBJECTIVEDESCRIPTION%'
    progress: '    <veryUnimportant>└─ <unimportant>Progresso: <main>%ACTIVEOBJECTIVEPROGRESS% / %OBJECTIVEPROGRESSNEEDED%'
    successfully-completed: '

