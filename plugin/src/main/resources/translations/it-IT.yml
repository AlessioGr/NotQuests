gui:
  abort-quest-confirm:
    title: <!i><red>Annulla quest <dark_gray>- <dark_red>Sei sicuro?
    button:
      cancelabort:
        name: <!i><red>Clicca per annullare
        lore:
        - '<!i><gray>Annulla l''interruzione della quest '
      confirmabort:
        name: <!i><dark_red>Clicca per annullare la quest
        lore:
        - '<!i><gray>Interrompe la quest '
        - <!i><dark_red>Tutti i progressi andranno persi!
  active-quest-info:
    title: <main>Info quest <gray>- <green>%QUESTNAME%
    button:
      infobook:
        name: <!i><green>%QUESTNAME%
        lore:
        - <!i><gray>%QUESTDESCRIPTION%
      abort:
        name: <!i><red>Annulla quest
        lore:
        - <!i><red>Clicca per annullare la quest
      back:
        name: <!i><red>Torna alla pagina precedente
  category-take:
    title: <main>Prendi nuova quest
    button:
      return:
        name: <!i><red>Indietro
      quests:
        name: <!i><!i><green>%QUESTNAME%
        lore:
        - <!i><gray>%QUESTDESCRIPTION%
      back:
        name: <!i><gray>Pagina precedente
      forward:
        name: <!i><gray>Pagina successiva
  main-base:
    title: <main>Menu quest
    button:
      questpoints:
        name: <!i><main>Punti quest
        lore:
        - '<!i><gray>I tuoi punti quest: <yellow>%QUESTPOINTS%'
      tab1:
        name: <!i><main>Quest attive
        lore:
        - <!i><gray>Vedi le tue quest attive
      tab2:
        name: <!i><main>Prendi una nuova quest
        lore:
        - <!i><gray>Vedi le quest disponibili
  main-active:
    title: <main>Menu quest <gray>- <highlight>Quest attive
    button:
      quests:
        name: <!i><green>%QUESTNAME%
        lore:
        - <!i><gray>%QUESTDESCRIPTION%
      back:
        name: <!i><gray>Pagina precedente
      forward:
        name: <!i><gray>Pagina successiva
  main-take:
    title: <main>Menu quest <gray>- <highlight>Prendi una nuova quest
    button:
      categories:
        name: <!i><yellow>%CATEGORYNAME%
        lore:
        - <!i><gray>Clicca per vedere le quest
        - <!i><gray>disponibili nella categoria
      back:
        name: <!i><gray>Pagina precedente
      forward:
        name: <!i><gray>Pagina successiva
  npc-available-quests:
    title: <!i><main>Quest disponibili
    button:
      quest:
        name: <!i><green>%QUESTNAME%
        lore:
        - <!i><gray>%QUESTDESCRIPTION%
      back:
        name: <!i><gray>Pagina precedente
      forward:
        name: <!i><gray>Pagina successiva
  quest-preview:
    title: <main>Anteprima quest
    button:
      info:
        name: <!i><green>%QUESTNAME%
        lore:
        - <!i><gray>%QUESTDESCRIPTION%
      accept:
        name: <!i><green>Accetta quest
      decline:
        name: <!i><red>Rifiuta quest
