    subtitle: <highlight>%QUESTNAME%
  quest-completed:
    title: <positive>Quest completata
    subtitle: <highlight>%QUESTNAME%
  quest-failed:
    title: <negative>Quest fallita
    subtitle: <highlight>%QUESTNAME%
placeholders:
  questcooldownleftformatted:
