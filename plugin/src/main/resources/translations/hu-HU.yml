        - <!i><gray>Kattints az elérhető küldetések
        - <!i><gray>megtekintéséhez a kategóriában
      back:
        name: <!i><gray>Előző oldal
      forward:
        name: <!i><gray>Következő oldal
  npc-available-quests:
