    button:
      quest:
        name: <!i><green>%QUESTNAME%
        lore:
        - <!i><gray>%QUESTDESCRIPTION%
      back:
        name: <!i><gray>Előző oldal
      forward:
        name: <!i><gray>Következő oldal
  quest-preview:
