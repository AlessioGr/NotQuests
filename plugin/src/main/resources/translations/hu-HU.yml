gui:
  abort-quest-confirm:
    title: "<!i><red>Abort Quest <dark_gray>- <dark_red>Are you sure?"
    button:
      cancelabort:
        name: "<!i><red>Click to cancel"
        lore:
          - "<!i><gray>Cancels the abortion of the quest "
      confirmabort:
        name: "<!i><dark_red>Click to abort quest"
        lore:
          - "<!i><gray>Aborts the quest "
          - "<!i><dark_red>All progress will be lost!"
  active-quest-info:
    title: "<main>Questinfo <gray>- <green>%QUESTNAME%"
    button:
      infobook:
        name: "<!i><green>%QUESTNAME%"
        lore:
          - "<!i><gray>%QUESTDESCRIPTION%"
      abort:
        name: "<!i><red>Abort quest"
        lore:
          - "<!i><red>Click to abort quest"
      back:
        name: "<!i><red>Back to previous page"
  category-take:
    title: "<main>Take new quest"
    button:
      return:
        name: "<!i><red>Back"
      quests:
        name: "<!i><!i><green>%QUESTNAME%"
        lore:
          - "<!i><gray>%QUESTDESCRIPTION%"
      back:
        name: "<!i><gray>Previous page"
      forward:
        name: "<!i><gray>Next page"
  main-base:
    title: "<main>Questmenu"
    button:
      questpoints:
        name: "<!i><main>Questpoints"
        lore:
          - "<!i><gray>Your questpoints: <yellow>%QUESTPOINTS%"
      tab1:
        name: "<!i><main>Active quests"
        lore:
          - "<!i><gray>See your active quests"
      tab2:
        name: "<!i><main>Take a new quest"
        lore:
          - "<!i><gray>See available quests"
