  abort-disabled: <error>A(z) <highlight>%QUESTNAME%</highlight> küldetés megszakítása le van tiltva.
  quest-not-active-error: '<error>Hiba: <highlight>%QUESTNAME%</highlight> nem egy aktív Küldetés!'
  force-add-active-quest-accepted: <success>Sikeresen elfogadtad a küldetést (Eröltetve).
  add-active-quest-player-object-not-found: '<warn>Hiba: A Játékos objektum nem található. Kérlek jelentsd ezt a plugin fejlesztőjének.'
  reached-max-accepts-limit: '<red>Már túl sokszor vállaltad el ezt a küldetést. Csak

    <highlight>%MAXACCEPTS%</highlight> alkalommal vállalhatod el de már

    <highlight>%ACCEPTEDAMOUNT%</highlight> alkalommal elvállaltad.'
  reached-max-fails-limit: '<red>Már túl sokszor hibáztad el ezt a küldetést. Csak

    <highlight>%MAXFAILS%</highlight> alkalommal hibázhatod el de már

    <highlight>%FAILEDAMOUNT%</highlight> alkalommal hibáztad el.'
