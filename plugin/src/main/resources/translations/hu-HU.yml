      return:
        name: <!i><red>Vissza
      quests:
        name: <!i><!i><green>%QUESTNAME%
        lore:
        - <!i><gray>%QUESTDESCRIPTION%
      back:
        name: <!i><gray>Előző oldal
      forward:
        name: <!i><gray>Következő oldal
  main-base:
    title: <main>Küldetés menü
    button:
      questpoints:
        name: <!i><main>Küldetés pontok
        lore:
        - '<!i><gray>Küldetés pontjaid: <yellow>%QUESTPOINTS%'
      tab1:
        name: <!i><main>Aktív küldetések
        lore:
        - <!i><gray>Nézd meg az aktív küldetéseidet
      tab2:
        name: <!i><main>Új küldetés elvállalása
        lore:
        - <!i><gray>Nézd meg az elérhető küldetéseket
  main-active:
