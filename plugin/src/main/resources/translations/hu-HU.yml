        - '<!i><gray>Megszakítja a küldetés megszakítását '
      confirmabort:
        name: <!i><dark_red>Kattints a küldetés megszakításához
        lore:
        - '<!i><gray>Megszakítja a küldetést '
        - <!i><dark_red>Minden haladás elveszik!
  active-quest-info:
    title: <main>Küldetés info <gray>- <green>%QUESTNAME%
