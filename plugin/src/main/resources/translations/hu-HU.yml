      infobook:
        name: <!i><green>%QUESTNAME%
        lore:
        - <!i><gray>%QUESTDESCRIPTION%
      abort:
        name: <!i><red>Küldetés megszakítása
        lore:
        - <!i><red>Kattints a küldetés megszakításához
      back:
        name: <!i><red>Vissza az előző oldalra
  category-take:
