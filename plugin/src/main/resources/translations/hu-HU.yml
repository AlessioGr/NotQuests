    button:
      quests:
        name: "<!i><green>%QUESTNAME%"
        lore:
          - "<!i><gray>%QUESTDESCRIPTION%"
      back:
        name: "<!i><gray>Previous page"
      forward:
        name: "<!i><gray>Next page"
  main-take:
    title: "<main>Questmenu <gray>- <highlight>Take a new quest"
    button:
      categories:
        name: "<!i><yellow>%CATEGORYNAME%"
        lore:
          - "<!i><gray>Click to view available"
