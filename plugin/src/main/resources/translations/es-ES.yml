gui:
  abort-quest-confirm:
    title: <!i><red>Abortar la misión <dark_gray>- <dark_red>¿Estás seguro?
    button:
      cancelabort:
        name: <!i><red>Click para cancelar
        lore:
        - '<!i><gray>Cancela el abandono de la misión '
      confirmabort:
        name: <!i><dark_red>Click para abortar la misión
        lore:
        - '<!i><gray>Aborta la misión '
        - <!i><dark_red>¡Se perderá todo el progreso!
  active-quest-info:
    title: <main>Info de la misión <gray>- <green>%QUESTNAME%
    button:
      infobook:
        name: <!i><green>%QUESTNAME%
        lore:
        - <!i><gray>%QUESTDESCRIPTION%
      abort:
        name: <!i><red>Abortar la misión
        lore:
        - <!i><red>Click para abortar la misión
      back:
        name: <!i><red>Volver a la página anterior
  category-take:
    title: <main>Tomar nueva misión
    button:
      return:
        name: <!i><red>Volver
      quests:
        name: <!i><!i><green>%QUESTNAME%
        lore:
        - <!i><gray>%QUESTDESCRIPTION%
      back:
        name: <!i><gray>Página anterior
      forward:
        name: <!i><gray>Página siguiente
  main-base:
    title: <main>Menú de misiones
    button:
      questpoints:
        name: <!i><main>Puntos de misión
        lore:
        - '<!i><gray>Tus puntos de misión: <yellow>%QUESTPOINTS%'
      tab1:
        name: <!i><main>Misiones activas
        lore:
        - <!i><gray>Mira tus misiones activas
      tab2:
        name: <!i><main>Tomar una nueva misión
        lore:
        - <!i><gray>Mira las misiones disponibles
  main-active:
    title: <main>Menú de misiones <gray>- <highlight>Misiones activas
    button:
      quests:
        name: <!i><green>%QUESTNAME%
        lore:
        - <!i><gray>%QUESTDESCRIPTION%
      back:
        name: <!i><gray>Página anterior
      forward:
        name: <!i><gray>Página siguiente
  main-take:
    title: <main>Menú de misiones <gray>- <highlight>Tomar una nueva misión
    button:
      categories:
        name: <!i><yellow>%CATEGORYNAME%
        lore:
        - <!i><gray>Click para ver las misiones
        - <!i><gray>disponibles en la categoría
      back:
        name: <!i><gray>Página anterior
      forward:
        name: <!i><gray>Página siguiente
  npc-available-quests:
    title: <!i><main>Misiones disponibles
    button:
      quest:
        name: <!i><green>%QUESTNAME%
        lore:
        - <!i><gray>%QUESTDESCRIPTION%
      back:
        name: <!i><gray>Página anterior
      forward:
        name: <!i><gray>Página siguiente
  quest-preview:
    title: <main>Vista previa de la misión
    button:
      info:
        name: <!i><green>%QUESTNAME%
        lore:
        - <!i><gray>%QUESTDESCRIPTION%
      accept:
        name: <!i><green>Aceptar la misión
      decline:
        name: <!i><red>Rechazar la misión
