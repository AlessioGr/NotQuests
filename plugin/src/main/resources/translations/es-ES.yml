---
chat:
  wrong-command-usage: <error>¡No estás usando el comando correctamente!
  missing-permission: '<error>¡No tienes permisos! Nodo de permisos requerido: <highlight>%PERMISSION%'
  too-many-arguments: <error>¡Demasiados argumentos!
  quest-successfully-accepted: |2

    <CENTER><main>[Misión Aceptada]
    <CENTER><highlight><BOLD>%QUESTNAME%
    <EMPTY>
  quest-description: '<main>Descripción de la misión: <unimportant>%QUESTDESCRIPTION%'
  quest-already-accepted: <error>La misión ya ha sido aceptada.
  quest-failed: |2

    <CENTER><negative>[Misión Fallida]
    <CENTER><highlight><BOLD>%QUESTNAME%
    <EMPTY>
  quest-aborted: ''
  quest-completed-and-rewards-given: |2

    <CENTER><positive>[Misión Completada]
    <CENTER><highlight><BOLD>%QUESTNAME%
    <EMPTY>
  quest-completed-rewards-prefix: '    <highlight>Recompensas:'
  quest-completed-rewards-rewardformat: '    <highlight> - <unimportant>%reward%'
  quest-completed-rewards-suffix: <EMPTY>
  quest-not-all-requirements-fulfilled: '<negative>No cumples todos los requisitos necesarios para esta misión. Requerimiento necesario:'
  action-not-all-conditions-fulfilled: '<negative>No cumples todas las condiciones que necesita esta acción! Condiciones necesarias:'
  missing-quest-description: <unimportant>Esta misión no tiene descripción.
  objectives-label-after-quest-accepting: '<highlight>Objetivos:'
  questpoints:
    query: <main>Actualmente tienes <highlight>%QUESTPOINTS%</highlight> puntos de misión.
    none: <error>¡Parece que no tienes ningún punto de misión!
    notify-when-changed:
      set: '<main>Tus puntos de misión se han establecido en <highlight>%NEWQUESTPOINTSAMOUNT%</highlight>.'
      add: '<highlight>+%QUESTPOINTSTOADD% <success>puntos de misión!'
      remove: '<highlight>-%QUESTPOINTSTOREMOVE% <negative>puntos de misión!'
  no-quests-accepted: <error>¡Parece que no tienes ninguna misión activa!
  quest-does-not-exist: <error>¡La misión <highlight>%QUESTNAME%</highlight> no existe!
  quest-not-found-or-does-not-exist: <error>La misión <highlight>%QUESTNAME%</highlight> no fue encontrada o no está activa!
  active-quests-label: '<highlight>Misiones activas:'
  take-disabled: <error>Aceptar o previsualizar la misión <highlight>%QUESTNAME%</highlight> está deshabilitado.
  abort-disabled: <error>Cancelar la misión <highlight>%QUESTNAME%</highlight> está deshabilitado.
  quest-not-active-error: '<error>Error: ¡<highlight>%QUESTNAME%</highlight> no es una misión activa!'
  force-add-active-quest-accepted: '<success>Se aceptó con éxito la misión (Forzada).'
  add-active-quest-player-object-not-found: '<warn>Error: El objeto del jugador no se encuentra. Por favor reporta esto al desarrollador del plugin.'
  reached-max-accepts-limit: '<red>Tu ya terminaste esta mision muchas veces. Tu solo puedes aceptar esta misión <highlight>%MAXACCEPTS%</highlight> veces, pero ya lo has terminado <highlight>%ACCEPTEDAMOUNT%</highlight> veces.'
  reached-max-fails-limit: '<red>Has fallado esta misión demasiadas veces. Solo puedes fallar <highlight>%MAXFAILS%</highlight> veces, pero ya lo has fallado <highlight>%FAILEDAMOUNT%</highlight> veces.'
  reached-max-completions-limit: '<red>Tu ya terminaste esta mision muchas veces. Tu solo puedes aceptar esta misión <highlight>%MAXCOMPLETIONS%</highlight> veces, pero ya lo has terminado <highlight>%COMPLETEDAMOUNT%</highlight> veces.'
  reached-max-active-quests-per-player-limit: '<red>No puede aceptar más de <highlight>%MAXACTIVEQUESTSPERPLAYER%</highlight> Misiones.'
  quest-on-cooldown:
    minute: '<red>¡Esta misión esta esta con tiempo de espera! Tienes que esperar <highlight>1 minuto</highlight> antes de hacer otra vez la mision.'
    minutes: '<red>¡Esta misión esta esta con tiempo de espera! Tienes que esperar <highlight>%MINUTES%</highlight> antes de hacer otra vez la mision.'
    hour: '<red>¡Esta misión esta esta con tiempo de espera! Tienes que esperar <highlight>1 hora</highlight> antes de hacer otra vez la mision.'
    hours: '<red>¡Esta misión esta esta con tiempo de espera! Tienes que esperar <highlight>%HOURS%</highlight> antes de hacer otra vez la mision.'
    day: '<red>¡Esta misión esta esta con tiempo de espera! Tienes que esperar <highlight>1 día</highlight> antes de hacer otra vez la mision.'
    days: '<red>¡Esta misión esta esta con tiempo de espera! Tienes que esperar <highlight>%DAYS%</highlight> antes de hacer otra vez la mision.'
  profiles:
    list-current: '<highlight>Perfil actual: <main>%PROFILENAME% (%QUESTPOINTS% puntos)'
    list-other-heading: '<highlight>Otros perfiles:'
    list-other-none: '  <main>No tienes más perfiles.'
    list-other: '  <highlight>- <main>%PROFILENAME% (%QUESTPOINTS% puntos)'
    change-same-profile: '<error>Ya estás usando ese perfil!'
    change-profile-doesnt-exist: '<error>Ese perfil no existe.'
    changed-successfully: '<success>Has cambiado tu perfil de %OLDPROFILENAME% a <highlight>%NEWPROFILENAME%</highlight> exitosamente!'
    create-already-exists: '<error>Ya existe un perfil con el nombre <highlight>%NEWPROFILENAME%</highlight>.'
    create-invalid-characters: '<error>El nombre de perfil ingresado tiene caracteres no válidos.'
    created-successfully: '<success>¡! Se creó correctamente el perfil<highlight>%NEWPROFILENAME%</highlight>! Para cambiarlo usa <highlight2>/nq profiles change %NEWPROFILENAME%</highlight2>'
  conversations:
    choose-answer-prefix: |-
      <EMPTY>
      <main>Elige tu respuesta:</main>
    choose-answer-answer-hover-text: '<highlight>Click para responder'
    ended-previous-conversation: '<main>¡Has terminado la conversación anterior!'
    speaker-line-format: '%SPEAKERCOLOR%[%SPEAKER%] <GRAY>%MESSAGE%'
    answer-option-line-format: ' <main>%OPTIONNUMBER%. <gray>%MESSAGE%'
  objectives:
    counter: '<highlight>%OBJECTIVEIDWITHSUBID%.</highlight> <main>%OBJECTIVENAME%:'
    counterForObjectiveObjective: '<highlight>%OBJECTIVEIDWITHSUBID%.</highlight> <main>%OBJECTIVEHOLDERNAME%:'
    subObjectivePrefixAppend: '    '
    hidden: <highlight>%OBJECTIVEID%.</highlight> <unimportant><BOLD>[HIDDEN]
    description: '    <veryUnimportant>└─ <unimportant>Descrición: <main>%OBJECTIVEDESCRIPTION%'
    progress: '    <veryUnimportant>└─ <unimportant>Progreso: <main>%ACTIVEOBJECTIVEPROGRESS% / %OBJECTIVEPROGRESSNEEDED%'
    successfully-completed: |2

      <CENTER><success>[Objective Completed]
      <CENTER><highlight><bold>%OBJECTIVENAME%</bold> <!i><main>(%QUESTNAME%)
      <EMPTY>
    successfully-completed-rewards-prefix: '    <highlight>Recompensas:'
    successfully-completed-rewards-rewardformat: '    <highlight> - <unimportant>%reward%'
    successfully-completed-rewards-suffix: <EMPTY>
    taskDescription:
      global:
        prefix: '    <veryUnimportant>└─ <unimportant>'
        suffix: ''
      breakBlocks:
        base: 'Romper bloques: <main>%BLOCKTOBREAK%'
      breed:
        base: 'Alimentar Mob: <main>%ENTITYTOBREED%'
      pickupItems:
        base: 'Recolectar: <main>%ITEMTOPICKUPTYPE% %(%%ITEMTOPICKUPNAME%%)%'
