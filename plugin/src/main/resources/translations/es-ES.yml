        base: 'Consumir items: <main>%ITEMTOCONSUMETYPE%%(%%ITEMTOCONSUMENAME%%)%'
      craftItems:
        base: 'Fabricar Items: <main>%ITEMTOCRAFTTYPE%%(%%ITEMTOCRAFTNAME%%)%'
      deliverItems:
        base: 'Entregar Items: <main>%ITEMTODELIVERTYPE% (%%ITEMTODELIVERNAME%%(%'
        deliver-to-npc: '      <GRAY>Entregarlo a <WHITE>%NPCNAME%'
        deliver-to-npc-not-available: '      <GRAY>¡El NPC al que tienes entregar no esta disponible!'
      enchant:
        base: 'Encantar objetos con %ENCHANTMENT%: <main>%ITEMTOENCHANTTYPE% %(%%ITEMTOENCHANTNAME%%(%'
      escortNPC:
        base: 'Escolta al NPC <main>%NPCNAME%</main> hacia <main>%DESTINATIONNPCNAME%'
      fishItems:
        base: 'Pescar Items: <main>%ITEMTOFISHTYPE% %(%%ITEMTOFISHNAME%%)%'
      killMobs:
        base: 'Matar Mobs: <main>%MOBTOKILL%'
      otherQuest:
        base: 'Completar Misión: <main>%OTHERQUESTNAME%'
      placeBlocks:
        base: 'Poner Bloques: <main>%BLOCKTOPLACE%'
      reachLocation:
        base: 'Ir hacia: <main>%LOCATIONNAME%'
