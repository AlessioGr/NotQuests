  bossbar-progress-update:
    default: <positive>%QUESTNAME%</positive> <unimportant>- <main>%OBJECTIVENAME%</main> <unimportant>(<positive>%ACTIVEOBJECTIVEPROGRESS% <unimportant>/ <main>%OBJECTIVEPROGRESSNEEDED% <unimportant>- <highlight>%OBJECTIVEPROGRESSPERCENTAGE%%<unimportant>)
    only-one-max-progress: <positive>%QUESTNAME%</positive> <unimportant>- <main>%OBJECTIVENAME%</main> <unimportant>(<highlight>%OBJECTIVEPROGRESSPERCENTAGE%%<unimportant>)
titles:
  quest-accepted:
    title: <main>任务已接受
    subtitle: <highlight>%QUESTNAME%
  quest-completed:
    title: <positive>任务已完成
    subtitle: <highlight>%QUESTNAME%
  quest-failed:
    title: <negative>任务失败
    subtitle: <highlight>%QUESTNAME%
placeholders:
  questcooldownleftformatted:
    prefix: ''
    minute: 1 分钟
    minutes: '%MINUTES% 分钟'
    hour: 1 小时
    hours: '%HOURS% 小时'
    day: 1 天
    days: '%DAYS% 天'
    no-cooldown: ''
gui:
  abort-quest-confirm:
    title: <!i><red>放弃任务 <dark_gray>- <dark_red>确定吗？
    button:
      cancelabort:
        name: <!i><red>点击取消
        lore:
        - '<!i><gray>取消放弃该任务 '
      confirmabort:
        name: <!i><dark_red>点击放弃任务
        lore:
        - '<!i><gray>放弃该任务 '
        - <!i><dark_red>所有进度都将丢失！
  active-quest-info:
    title: <main>任务信息 <gray>- <green>%QUESTNAME%
    button:
      infobook:
        name: <!i><green>%QUESTNAME%
        lore:
        - <!i><gray>%QUESTDESCRIPTION%
      abort:
        name: <!i><red>放弃任务
        lore:
        - <!i><red>点击放弃任务
      back:
        name: <!i><red>返回上一页
  category-take:
    title: <main>领取新任务
    button:
      return:
        name: <!i><red>返回
      quests:
        name: <!i><!i><green>%QUESTNAME%
        lore:
        - <!i><gray>%QUESTDESCRIPTION%
      back:
        name: <!i><gray>上一页
      forward:
        name: <!i><gray>下一页
  main-base:
    title: <main>任务菜单
    button:
      questpoints:
        name: <!i><main>任务点数
        lore:
        - '<!i><gray>你的任务点数: <yellow>%QUESTPOINTS%'
      tab1:
        name: <!i><main>进行中的任务
        lore:
        - <!i><gray>查看你进行中的任务
      tab2:
        name: <!i><main>领取新任务
        lore:
        - <!i><gray>查看可领取的任务
  main-active:
    title: <main>任务菜单 <gray>- <highlight>进行中的任务
    button:
      quests:
        name: <!i><green>%QUESTNAME%
        lore:
        - <!i><gray>%QUESTDESCRIPTION%
      back:
        name: <!i><gray>上一页
      forward:
        name: <!i><gray>下一页
  main-take:
    title: <main>任务菜单 <gray>- <highlight>领取新任务
    button:
      categories:
        name: <!i><yellow>%CATEGORYNAME%
        lore:
        - <!i><gray>点击查看该分类中
        - <!i><gray>可领取的任务
      back:
        name: <!i><gray>上一页
      forward:
        name: <!i><gray>下一页
  npc-available-quests:
    title: <!i><main>可领取的任务
    button:
      quest:
        name: <!i><green>%QUESTNAME%
        lore:
        - <!i><gray>%QUESTDESCRIPTION%
      back:
        name: <!i><gray>上一页
      forward:
        name: <!i><gray>下一页
  quest-preview:
    title: <main>任务预览
    button:
      info:
        name: <!i><green>%QUESTNAME%
        lore:
        - <!i><gray>%QUESTDESCRIPTION%
      accept:
        name: <!i><green>接受任务
      decline:
        name: <!i><red>拒绝任务
