---
chat:
  wrong-command-usage: <error>指令错误!
  missing-permission: '<error>权限不足! 需要权限: <highlight>%PERMISSION%'
  too-many-arguments: <error>参数过多!
  quest-successfully-accepted: '

    <CENTER><main>[任务已接受]

    <CENTER><highlight><BOLD>%QUESTNAME%

    <EMPTY>

    '
  quest-description: '<main>任务描述: <unimportant>%QUESTDESCRIPTION%'
  quest-already-accepted: <error>已经接受该任务了.
  quest-failed: '

    <CENTER><negative>[任务失败]

    <CENTER><highlight><BOLD>%QUESTNAME%

    <EMPTY>

    '
  quest-aborted: ''
  quest-completed-and-rewards-given: '

    <CENTER><positive>[任务已完成]

    <CENTER><highlight><BOLD>%QUESTNAME%

    <EMPTY>

    '
  quest-completed-rewards-prefix: '    <highlight>任务奖励:'
  quest-completed-rewards-rewardformat: '    <highlight> - <unimportant>%reward%'
  quest-completed-rewards-suffix: <EMPTY>
  quest-not-all-requirements-fulfilled: '<negative>您没有满足该任务的前置要求! 缺少要求:'
  action-not-all-conditions-fulfilled: <negative>你没有满足这个任务的所有前置条件！需求仍然需要：
  missing-quest-description: <unimportant>此任务没有描述.
  objectives-label-after-quest-accepting: '<highlight>目标:'
  questpoints:
    query: <main>你当前拥有 <highlight>%QUESTPOINTS%</highlight> 任务点数.
    none: <error>您貌似还没有任务点数!
    notify-when-changed:
      set: <main>您的任务点数已设置为 <highlight>%NEWQUESTPOINTSAMOUNT%</highlight>.
      add: <highlight>+%QUESTPOINTSTOADD%<success>任务点数!
      remove: <highlight>-%QUESTPOINTSTOREMOVE% <negative>任务点数!
  no-quests-accepted: <error>您貌似没有进行中的任务!
  quest-does-not-exist: <error>任务 <highlight>%QUESTNAME%</highlight> 不存在!
  quest-not-found-or-does-not-exist: <error>任务 <highlight>%QUESTNAME%</highlight> 不存在或还未开始!
  active-quests-label: '<highlight>进行中的任务:'
  take-disabled: <error>你不能接受或预览任务 <highlight>%QUESTNAME%</highlight>.
  abort-disabled: <error>终止任务 <highlight>%QUESTNAME%</highlight> 已禁用.
  quest-not-active-error: '<error>错误: <highlight>%QUESTNAME%</highlight> 好像还没有开始!'
  force-add-active-quest-accepted: <success>已接受任务 (强制).
  add-active-quest-player-object-not-found: '<warn>错误: 未找到玩家. 请向服务器管理员报告.'
  reached-max-accepts-limit: <red>你已经接受这个任务太多次了. 你只能接受 <highlight>%MAXACCEPTS%</highlight> 次, 但你已经接受了 <highlight>%ACCEPTEDAMOUNT%</highlight> 次.
  reached-max-fails-limit: <red>你已经在这个任务上失败太多次了. 你只能失败 <highlight>%MAXFAILS%</highlight> 次, 但你已经失败了 <highlight>%FAILEDAMOUNT%</highlight> 次.
  reached-max-completions-limit: <red>你已经完成这个任务太多次了. 你只能完成 <highlight>%MAXCOMPLETIONS%</highlight> 次, 但你已经完成了 <highlight>%COMPLETEDAMOUNT%</highlight> 次.
  reached-max-active-quests-per-player-limit: <red>您最多同时接受 <highlight>%MAXACTIVEQUESTSPERPLAYER%</highlight> 个任务.
  quest-on-cooldown:
    minute: <red>任务冷却中! 您还需要等待 <highlight>1 分钟</highlight> 才能接受该任务.
    minutes: <red>任务冷却中! 您还需要等待 <highlight>%MINUTES% 分钟</highlight> 才能接受该任务.
    hour: <red>任务冷却中! 您还需要等待 <highlight>1 小时</highlight> 才能接受该任务.
    hours: <red>任务冷却中! 您还需要等待 <highlight>%HOURS% 小时</highlight> 才能接受该任务.
    day: <red>任务冷却中! 您还需要等待 <highlight>1 天</highlight> 才能接受该任务.
    days: <red>任务冷却中! 您还需要等待 <highlight>%DAYS% 天</highlight> 才能接受该任务.
  profiles:
    list-current: '<highlight>当前个人资料: <main>%PROFILENAME% (%QUESTPOINTS% 任务点数)'
    list-other-heading: '<highlight>其它个人资料:'
    list-other-none: '  <main>你没有其它个人资料.'
    list-other: '  <highlight>- <main>%PROFILENAME% (%QUESTPOINTS% 任务点数)'
    change-same-profile: <error>你已经在使用这个个人资料了!
    change-profile-doesnt-exist: <error>这个个人资料不存在.
    changed-successfully: <success>你成功将个人资料由 %OLDPROFILENAME% 切换到了 <highlight>%NEWPROFILENAME%</highlight>!
    create-already-exists: <error>一个名为 <highlight>%NEWPROFILENAME%</highlight> 的个人资料已经存在了.
    create-invalid-characters: <error>个人资料名称包含无效字符.
    created-successfully: <success>你成功创建了个人资料 <highlight>%NEWPROFILENAME%</highlight>! 想要切换个人资料, 使用<highlight2>/nq profiles change %NEWPROFILENAME%</highlight2>
  conversations:
    choose-answer-prefix: '<EMPTY>

      <main>请选择你的答案:</main>'
    choose-answer-answer-hover-text: <highlight>点击回答
    ended-previous-conversation: <main>您已经结束了之前的对话!
    speaker-line-format: '%SPEAKERCOLOR%[%SPEAKER%] <GRAY>%MESSAGE%'
    answer-option-line-format: ' <main>%OPTIONNUMBER%. <gray>%MESSAGE%'
  objectives:
    counter: '<highlight>%OBJECTIVEIDWITHSUBID%.</highlight> <main>%OBJECTIVENAME%:'
    counterForObjectiveObjective: '<highlight>%OBJECTIVEIDWITHSUBID%.</highlight> <main>%OBJECTIVEHOLDERNAME%:'
    subObjectivePrefixAppend: '    '
    hidden: <highlight>%OBJECTIVEID%.</highlight> <unimportant><BOLD>[已隐藏]
    description: '    <veryUnimportant>└─ <unimportant>描述: <main>%OBJECTIVEDESCRIPTION%'
    progress: '    <veryUnimportant>└─ <unimportant>进度: <main>%ACTIVEOBJECTIVEPROGRESS% / %OBJECTIVEPROGRESSNEEDED%'
    successfully-completed: '

      <CENTER><success>[目标已完成]

      <CENTER><highlight><bold>%OBJECTIVENAME%</bold> <RESET><main>(%QUESTNAME%)

      <EMPTY>

      '
    successfully-completed-rewards-prefix: '    <highlight>奖励:'
    successfully-completed-rewards-rewardformat: '    <highlight> - <unimportant>%reward%'
    successfully-completed-rewards-suffix: <EMPTY>
    taskDescription:
      global:
        prefix: '    <veryUnimportant>└─ <unimportant>'
        suffix: ''
      breakBlocks:
        base: 破坏方块：<main>%BLOCKTOBREAK%
      breed:
        base: 繁殖生物：<main>%ENTITYTOBREED%
      pickupItems:
        base: '捡拾物品: <main>%ITEMTOPICKUPTYPE% %(%%ITEMTOPICKUPNAME%%)%'
      consumeItems:
        base: 消耗物品：<main>%ITEMTOCONSUMETYPE% %(%%ITEMTOCONSUMENAME%%)%
      craftItems:
        base: 制作物品：<main>%ITEMTOCRAFTTYPE% %(%%ITEMTOCRAFTNAME%%)%
      deliverItems:
        base: '递送物品: <main>%ITEMTODELIVERTYPE% %(%%ITEMTODELIVERNAME%%(%'
        deliver-to-npc: '      <GRAY>把物品递交给 <WHITE>%NPCNAME%'
        deliver-to-npc-not-available: '      <GRAY>负责收取物品的NPC暂时不在!'
      enchant:
        base: '使用 %ENCHANTMENT% 附魔物品: <main>%ITEMTOENCHANTTYPE% %(%%ITEMTOENCHANTNAME%%(%'
      escortNPC:
        base: 护送 <main>%NPCNAME%</main> to <main>%DESTINATIONNPCNAME%
