        base: 钓出物品：<main>%ITEMTOFISHTYPE% %(%%ITEMTOFISHNAME%%)%
      killMobs:
        base: '击杀生物：Kill mobs: <main>%MOBTOKILL%'
      otherQuest:
        base: 完成前置任务：<main>%OTHERQUESTNAME%
      placeBlocks:
        base: 放置方块：<main>%BLOCKTOPLACE%
      reachLocation:
        base: 到达任务地点：<main>%LOCATIONNAME%
      talkToNPC:
        base: 与 <main>%NAME% <unimportant>对话
        npc-not-available: '    <GRAY>目标NPC当前不可用!'
      triggerCommand:
        base: 目标：<main>%TRIGGERNAME%
      killEliteMobs:
        base: 击杀精英怪物： <main>%ELITEMOBNAME%
        any: 击杀所有精英生物！
      runCommand:
