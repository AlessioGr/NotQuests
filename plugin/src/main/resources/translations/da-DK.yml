    button:
      quests:
        name: <!i><green>%QUESTNAME%
        lore:
        - <!i><gray>%QUESTDESCRIPTION%
      back:
        name: <!i><gray>Forrige side
      forward:
        name: <!i><gray>Næste side
  main-take:
    title: <main>Questmenu <gray>- <highlight>Tag en ny quest
    button:
      categories:
        name: <!i><yellow>%CATEGORYNAME%
        lore:
        - <!i><gray>Klik for at se tilgængelige
        - <!i><gray>quests i kategorien
      back:
        name: <!i><gray>Forrige side
      forward:
        name: <!i><gray>Næste side
  npc-available-quests:
