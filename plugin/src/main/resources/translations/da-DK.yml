gui:
  abort-quest-confirm:
    title: <!i><red>Afbryd quest <dark_gray>- <dark_red>Er du sikker?
    button:
      cancelabort:
        name: <!i><red>Klik for at annullere
        lore:
        - '<!i><gray>Annullerer afbrydelsen af quest''en '
      confirmabort:
        name: <!i><dark_red>Klik for at afbryde quest
        lore:
        - '<!i><gray>Afbryder quest''en '
        - <!i><dark_red>Al fremgang vil gå tabt!
  active-quest-info:
    title: <main>Questinfo <gray>- <green>%QUESTNAME%
    button:
      infobook:
        name: <!i><green>%QUESTNAME%
        lore:
        - <!i><gray>%QUESTDESCRIPTION%
      abort:
        name: <!i><red>Afbryd quest
        lore:
        - <!i><red>Klik for at afbryde quest
      back:
        name: <!i><red>Tilbage til forrige side
  category-take:
    title: <main>Tag ny quest
    button:
      return:
        name: <!i><red>Tilbage
      quests:
        name: <!i><!i><green>%QUESTNAME%
        lore:
        - <!i><gray>%QUESTDESCRIPTION%
      back:
        name: <!i><gray>Forrige side
      forward:
        name: <!i><gray>Næste side
  main-base:
    title: <main>Questmenu
    button:
      questpoints:
        name: <!i><main>Questpoint
        lore:
        - '<!i><gray>Dine questpoint: <yellow>%QUESTPOINTS%'
      tab1:
        name: <!i><main>Aktive quests
        lore:
        - <!i><gray>Se dine aktive quests
      tab2:
        name: <!i><main>Tag en ny quest
        lore:
        - <!i><gray>Se tilgængelige quests
  main-active:
