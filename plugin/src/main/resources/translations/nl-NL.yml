      smelt:
        base: 'Smelt Items: <main>%ITEMTOSMELTTYPE% %(%%ITEMTOSMELTNAME%%)%'
      openBuriedTreasure:
        base: Open begraven schatten
      shearSheep:
        base: Scheer <main>%AMOUNTOFSHEEP%</main> schapen
      milkCow:
        base: 'Melk <main>%AMOUNTOFCOWS%</main> koeien'
      townyReachResidentCount:
        base: 'Bereik aantal inwoners: <main>%AMOUNT%'
      townyNationReachTownCount:
        base: 'Bereik aantal steden met je natie: <main>%AMOUNT%'
      jobsRebornReachJobLevel:
        base: Bereik beroepsniveau <main>%AMOUNT%</main> met beroep <main>%JOB%
