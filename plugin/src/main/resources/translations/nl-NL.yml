---
chat:
  wrong-command-usage: <error>Verkeerd gebruik van commando!
  missing-permission: '<error>Geen toestemming! Vereiste toestemmingsnode: <highlight>%PERMISSION%'
  too-many-arguments: <error>Te veel argumenten!
  quest-successfully-accepted: '

    <CENTER><main>[Opdracht Geaccepteerd]

    <CENTER><highlight><BOLD>%QUESTNAME%

    <EMPTY>

    '
  quest-description: '<main>Opdrachtbeschrijving: <unimportant>%QUESTDESCRIPTION%'
  quest-already-accepted: <error>Opdracht al geaccepteerd.
  quest-failed: '

    <CENTER><negative>[Opdracht Mislukt]

    <CENTER><highlight><BOLD>%QUESTNAME%

    <EMPTY>

    '
  quest-aborted: ''
  quest-completed-and-rewards-given: '

    <CENTER><positive>[Opdracht Voltooid]

    <CENTER><highlight><BOLD>%QUESTNAME%

    <EMPTY>

    '
  quest-completed-rewards-prefix: '    <highlight>Beloningen:'
  quest-completed-rewards-rewardformat: '    <highlight> - <unimportant>%reward%'
  quest-completed-rewards-suffix: <EMPTY>
  quest-not-all-requirements-fulfilled: '<negative>Je voldoet niet aan alle vereisten van deze opdracht! Vereiste nog nodig:'
