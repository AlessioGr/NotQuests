titles:
  quest-accepted:
    title: <main>Opdracht geaccepteerd
    subtitle: <highlight>%QUESTNAME%
  quest-completed:
    title: <positive>Opdracht Voltooid
    subtitle: <highlight>%QUESTNAME%
  quest-failed:
    title: <negative>Opdracht Mislukt
    subtitle: <highlight>%QUESTNAME%
placeholders:
  questcooldownleftformatted:
    prefix: ''
    minute: 1 minuut
    minutes: '%MINUTES% minuten'
    hour: 1 uur
    hours: '%HOURS% uur'
    day: 1 dag
    days: '%DAYS% dagen'
    no-cooldown: ''
gui:
  abort-quest-confirm:
    title: <!i><red>Opdracht Afbreken <dark_gray>- <dark_red>Weet je het zeker?
    button:
      cancelabort:
        name: <!i><red>Klik om te annuleren
        lore:
        - '<!i><gray>Annuleert het afbreken van de opdracht '
      confirmabort:
        name: <!i><dark_red>Klik om opdracht af te breken
        lore:
        - '<!i><gray>Breekt de opdracht af '
        - <!i><dark_red>Alle voortgang gaat verloren!
  active-quest-info:
    title: <main>Opdrachtinfo <gray>- <green>%QUESTNAME%
    button:
      infobook:
        name: <!i><green>%QUESTNAME%
        lore:
        - <!i><gray>%QUESTDESCRIPTION%
      abort:
        name: <!i><red>Opdracht afbreken
        lore:
        - <!i><red>Klik om opdracht af te breken
      back:
        name: <!i><red>Terug naar vorige pagina
  category-take:
    title: <main>Nieuwe opdracht aannemen
    button:
      return:
        name: <!i><red>Terug
      quests:
        name: <!i><!i><green>%QUESTNAME%
        lore:
        - <!i><gray>%QUESTDESCRIPTION%
      back:
        name: <!i><gray>Vorige pagina
      forward:
        name: <!i><gray>Volgende pagina
  main-base:
    title: <main>Opdrachtmenu
    button:
      questpoints:
        name: <!i><main>Opdrachtpunten
        lore:
        - '<!i><gray>Je opdrachtpunten: <yellow>%QUESTPOINTS%'
      tab1:
        name: <!i><main>Actieve opdrachten
        lore:
        - <!i><gray>Bekijk je actieve opdrachten
      tab2:
        name: <!i><main>Een nieuwe opdracht aannemen
        lore:
        - <!i><gray>Bekijk beschikbare opdrachten
  main-active:
    title: <main>Opdrachtmenu <gray>- <highlight>Actieve opdrachten
    button:
      quests:
        name: <!i><green>%QUESTNAME%
        lore:
        - <!i><gray>%QUESTDESCRIPTION%
      back:
        name: <!i><gray>Vorige pagina
      forward:
        name: <!i><gray>Volgende pagina
  main-take:
    title: <main>Opdrachtmenu <gray>- <highlight>Een nieuwe opdracht aannemen
    button:
      categories:
        name: <!i><yellow>%CATEGORYNAME%
        lore:
        - <!i><gray>Klik om beschikbare
        - <!i><gray>opdrachten in categorie te bekijken
      back:
        name: <!i><gray>Vorige pagina
      forward:
        name: <!i><gray>Volgende pagina
  npc-available-quests:
    title: <!i><main>Beschikbare opdrachten
    button:
      quest:
        name: <!i><green>%QUESTNAME%
        lore:
        - <!i><gray>%QUESTDESCRIPTION%
      back:
        name: <!i><gray>Vorige pagina
      forward:
        name: <!i><gray>Volgende pagina
  quest-preview:
    title: <main>Opdracht voorbeeld
    button:
      info:
        name: <!i><green>%QUESTNAME%
        lore:
        - <!i><gray>%QUESTDESCRIPTION%
      accept:
        name: <!i><green>Opdracht accepteren
      decline:
        name: <!i><red>Opdracht weigeren
