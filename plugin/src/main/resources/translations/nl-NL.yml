  missing-quest-description: <unimportant>Deze opdracht heeft geen opdrachtbeschrijving.
  objectives-label-after-quest-accepting: '<highlight>Doelen:'
  questpoints:
    query: <main>Je hebt momenteel <highlight>%QUESTPOINTS%</highlight> opdrachtpunten.
    none: <error>Het lijkt erop dat je geen opdrachtpunten hebt!
    notify-when-changed:
      set: <main>Je opdrachtpunten zijn ingesteld op <highlight>%NEWQUESTPOINTSAMOUNT%</highlight>.
      add: <highlight>+%QUESTPOINTSTOADD% <success>opdrachtpunten!
      remove: <highlight>-%QUESTPOINTSTOREMOVE% <negative>opdrachtpunten!
  no-quests-accepted: <error>Het lijkt erop dat je geen actieve opdrachten hebt!
  quest-does-not-exist: <error>Opdracht <highlight>%QUESTNAME%</highlight> bestaat niet!
  quest-not-found-or-does-not-exist: <error>Opdracht <highlight>%QUESTNAME%</highlight> niet gevonden of niet actief!
  active-quests-label: '<highlight>Actieve opdrachten:'
  take-disabled: <error>Het accepteren of bekijken van de opdracht <highlight>%QUESTNAME%</highlight> is uitgeschakeld.
  abort-disabled: <error>Het afbreken van de opdracht <highlight>%QUESTNAME%</highlight> is uitgeschakeld.
  quest-not-active-error: '<error>Fout: <highlight>%QUESTNAME%</highlight> is geen actieve opdracht!'
  force-add-active-quest-accepted: <success>Opdracht succesvol geaccepteerd (Geforceerd).
  add-active-quest-player-object-not-found: '<warn>Fout: Spelerobject niet gevonden. Meld dit aan de plugin-ontwikkelaar.'
  reached-max-accepts-limit: <red>Je hebt deze opdracht al te vaak geaccepteerd. Je kunt hem maar <highlight>%MAXACCEPTS%</highlight> keer accepteren, maar je hebt hem al <highlight>%ACCEPTEDAMOUNT%</highlight> keer geaccepteerd.
  reached-max-fails-limit: <red>Je hebt deze opdracht al te vaak gefaald. Je kunt hem maar <highlight>%MAXFAILS%</highlight> keer falen, maar je hebt hem al <highlight>%FAILEDAMOUNT%</highlight> keer gefaald.
  reached-max-completions-limit: <red>Je hebt deze opdracht al te vaak voltooid. Je kunt hem maar <highlight>%MAXCOMPLETIONS%</highlight> keer voltooien, maar je hebt hem al <highlight>%COMPLETEDAMOUNT%</highlight> keer voltooid.
  reached-max-active-quests-per-player-limit: <red>Je kunt niet meer dan <highlight>%MAXACTIVEQUESTSPERPLAYER%</highlight> opdrachten accepteren.
  quest-on-cooldown:
    minute: <red>Deze opdracht heeft een wachttijd! Je moet nog <highlight>1 minuut</highlight> wachten voordat je hem opnieuw kunt aannemen.
    minutes: <red>Deze opdracht heeft een wachttijd! Je moet nog <highlight>%MINUTES% minuten</highlight> wachten voordat je hem opnieuw kunt aannemen.
    hour: <red>Deze opdracht heeft een wachttijd! Je moet nog <highlight>1 uur</highlight> wachten voordat je hem opnieuw kunt aannemen.
    hours: <red>Deze opdracht heeft een wachttijd! Je moet nog <highlight>%HOURS% uur</highlight> wachten voordat je hem opnieuw kunt aannemen.
    day: <red>Deze opdracht heeft een wachttijd! Je moet nog <highlight>1 dag</highlight> wachten voordat je hem opnieuw kunt aannemen.
    days: <red>Deze opdracht heeft een wachttijd! Je moet nog <highlight>%DAYS% dagen</highlight> wachten voordat je hem opnieuw kunt aannemen.
  profiles:
    list-current: '<highlight>Huidig profiel: <main>%PROFILENAME% (%QUESTPOINTS% opdrachtpunten)'
    list-other-heading: '<highlight>Andere profielen:'
    list-other-none: '  <main>Je hebt geen andere profielen meer.'
    list-other: '  <highlight>- <main>%PROFILENAME% (%QUESTPOINTS% opdrachtpunten)'
    change-same-profile: <error>Je gebruikt dat profiel al!
    change-profile-doesnt-exist: <error>Dat profiel bestaat niet.
    changed-successfully: <success>Je hebt je profiel succesvol gewijzigd van %OLDPROFILENAME% naar <highlight>%NEWPROFILENAME%</highlight>!
    create-already-exists: <error>Een profiel met de naam <highlight>%NEWPROFILENAME%</highlight> bestaat al.
    create-invalid-characters: <error>De profielnaam die je hebt opgegeven bevat ongeldige tekens.
    created-successfully: <success>Je hebt het profiel <highlight>%NEWPROFILENAME%</highlight> succesvol aangemaakt! Om ernaar te wisselen, gebruik <highlight2>/nq profiles change %NEWPROFILENAME%</highlight2>
  conversations:
    choose-answer-prefix: '<EMPTY>

      <main>Kies je antwoord:</main>'
    choose-answer-answer-hover-text: <highlight>Klik om te antwoorden
    ended-previous-conversation: <main>Je hebt je vorige gesprek beëindigd!
    speaker-line-format: '%SPEAKERCOLOR%[%SPEAKER%] <GRAY>%MESSAGE%'
    answer-option-line-format: ' <main>%OPTIONNUMBER%. <gray>%MESSAGE%'
  objectives:
