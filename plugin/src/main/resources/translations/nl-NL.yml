        base: 'Voltooi Doel: <main>%BETONQUESTOBJECTIVENAME%'
  conditions:
    boolean:
      not-fulfilled: '<warn>Het volgende moet %BOOLEANREQUIREMENT% zijn: <highlight>%VARIABLESINGULAR%</highlight>.'
      variable-not-found: '<error>Fout: variabele <highlight>%VARIABLENAME%</highlight> niet gevonden. Meld dit aan de servereigenaar.'
      wrong-operator: '<error>Fout: variabele-operator <highlight>%OPERATOR%/highlight> is ongeldig. Meld dit aan de servereigenaar.'
