    prefix: ''
    minute: 1 分鐘
    minutes: '%MINUTES% 分鐘'
    hour: 1 小時
    hours: '%HOURS% 小時'
    day: 1 天
    days: '%DAYS% 天'
    no-cooldown: ''
gui:
  abort-quest-confirm:
    title: <!i><red>放棄任務 <dark_gray>- <dark_red>確定嗎？
    button:
      cancelabort:
        name: <!i><red>點擊取消
        lore:
        - '<!i><gray>取消放棄該任務 '
      confirmabort:
        name: <!i><dark_red>點擊放棄任務
        lore:
        - '<!i><gray>放棄該任務 '
        - <!i><dark_red>所有進度都將遺失！
  active-quest-info:
    title: <main>任務資訊 <gray>- <green>%QUESTNAME%
    button:
      infobook:
        name: <!i><green>%QUESTNAME%
        lore:
        - <!i><gray>%QUESTDESCRIPTION%
      abort:
        name: <!i><red>放棄任務
        lore:
        - <!i><red>點擊放棄任務
      back:
        name: <!i><red>返回上一頁
  category-take:
    title: <main>領取新任務
    button:
      return:
        name: <!i><red>返回
      quests:
        name: <!i><!i><green>%QUESTNAME%
        lore:
        - <!i><gray>%QUESTDESCRIPTION%
      back:
        name: <!i><gray>上一頁
      forward:
        name: <!i><gray>下一頁
  main-base:
    title: <main>任務選單
    button:
      questpoints:
        name: <!i><main>任務點數
        lore:
        - '<!i><gray>你的任務點數: <yellow>%QUESTPOINTS%'
      tab1:
        name: <!i><main>進行中的任務
        lore:
        - <!i><gray>查看你進行中的任務
      tab2:
        name: <!i><main>領取新任務
        lore:
        - <!i><gray>查看可領取的任務
  main-active:
    title: <main>任務選單 <gray>- <highlight>進行中的任務
    button:
      quests:
        name: <!i><green>%QUESTNAME%
        lore:
        - <!i><gray>%QUESTDESCRIPTION%
      back:
        name: <!i><gray>上一頁
      forward:
        name: <!i><gray>下一頁
  main-take:
    title: <main>任務選單 <gray>- <highlight>領取新任務
    button:
      categories:
        name: <!i><yellow>%CATEGORYNAME%
        lore:
        - <!i><gray>點擊查看該分類中
        - <!i><gray>可領取的任務
      back:
        name: <!i><gray>上一頁
      forward:
        name: <!i><gray>下一頁
  npc-available-quests:
    title: <!i><main>可領取的任務
    button:
      quest:
        name: <!i><green>%QUESTNAME%
        lore:
        - <!i><gray>%QUESTDESCRIPTION%
      back:
        name: <!i><gray>上一頁
      forward:
        name: <!i><gray>下一頁
  quest-preview:
