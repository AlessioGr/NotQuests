    title: <main>任務已接受
    subtitle: <highlight>%QUESTNAME%
  quest-completed:
    title: <positive>任務已完成
    subtitle: <highlight>%QUESTNAME%
  quest-failed:
    title: <negative>任務失敗
    subtitle: <highlight>%QUESTNAME%
placeholders:
