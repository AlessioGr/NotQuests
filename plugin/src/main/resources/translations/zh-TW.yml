    list-other-heading: '<highlight>其他個人資料:'
    list-other-none: '  <main>您沒有更多的個人資料。'
    list-other: '  <highlight>- <main>%PROFILENAME% (%QUESTPOINTS% 任務點數)'
    change-same-profile: <error>你已經正在使用這個人資料!
    change-profile-doesnt-exist: <error>這個人資料不存在。
    changed-successfully: <success>您已成功更改您的個人資料從 %OLDPROFILENAME% 到 <highlight>%NEWPROFILENAME%</highlight>!
    create-already-exists: <error>這個人資料名稱 <highlight>%NEWPROFILENAME%</highlight> 已經存在。
    create-invalid-characters: <error>您提供的個人資料名稱包含無效字符。
    created-successfully: <success>您已成功建立個人資料 <highlight>%NEWPROFILENAME%</highlight>! 輸入指令<highlight2>/nq profile 切換至 %NEWPROFILENAME%</highlight2>
