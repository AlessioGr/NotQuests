    button:
      infobook:
        name: <!i><green>%QUESTNAME%
        lore:
        - <!i><gray>%QUESTDESCRIPTION%
      abort:
        name: <!i><red>Abandonner la quête
        lore:
        - <!i><red>Cliquez pour abandonner la quête
      back:
        name: <!i><red>Retour à la page précédente
  category-take:
