      cancelabort:
        name: <!i><red>Cliquez pour annuler
        lore:
        - '<!i><gray>Annule l''abandon de la quête '
      confirmabort:
        name: <!i><dark_red>Cliquez pour abandonner la quête
        lore:
        - '<!i><gray>Abandonne la quête '
        - <!i><dark_red>Toute la progression sera perdue !
  active-quest-info:
