    progress: '    <veryUnimportant>└─ <unimportant>Progrès: <main>%ACTIVEOBJECTIVEPROGRESS% / %OBJECTIVEPROGRESSNEEDED%'
    successfully-completed: '

      <CENTER><success>[Objectif terminé]

      <CENTER><highlight><bold>%OBJECTIVENAME%</bold> <RESET><main>(%QUESTNAME%)

      <EMPTY>

      '
