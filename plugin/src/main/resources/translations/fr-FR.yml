    create-invalid-characters: <error>Le nom de profil que vous avez fourni contient des caractères non valides.
    created-successfully: <success>Vous avez créé le profil <highlight>%NEWPROFILENAME%</highlight> avec succès! Pour basculer vers celui-ci, utilisez <highlight2>/nq profiles change %NEWPROFILENAME%</highlight2>
