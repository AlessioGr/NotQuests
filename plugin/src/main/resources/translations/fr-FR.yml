    button:
      return:
        name: <!i><red>Retour
      quests:
        name: <!i><!i><green>%QUESTNAME%
        lore:
        - <!i><gray>%QUESTDESCRIPTION%
      back:
        name: <!i><gray>Page précédente
      forward:
        name: <!i><gray>Page suivante
  main-base:
    title: <main>Menu des quêtes
    button:
      questpoints:
        name: <!i><main>Points de quête
        lore:
        - '<!i><gray>Vos points de quête : <yellow>%QUESTPOINTS%'
      tab1:
        name: <!i><main>Quêtes actives
        lore:
        - <!i><gray>Voir vos quêtes actives
      tab2:
        name: <!i><main>Prendre une nouvelle quête
        lore:
        - <!i><gray>Voir les quêtes disponibles
  main-active:
    title: <main>Menu des quêtes <gray>- <highlight>Quêtes actives
    button:
      quests:
        name: <!i><green>%QUESTNAME%
        lore:
        - <!i><gray>%QUESTDESCRIPTION%
      back:
        name: <!i><gray>Page précédente
      forward:
        name: <!i><gray>Page suivante
  main-take:
    title: <main>Menu des quêtes <gray>- <highlight>Prendre une nouvelle quête
    button:
      categories:
        name: <!i><yellow>%CATEGORYNAME%
        lore:
        - <!i><gray>Cliquez pour voir les quêtes
        - <!i><gray>disponibles dans la catégorie
      back:
        name: <!i><gray>Page précédente
      forward:
        name: <!i><gray>Page suivante
  npc-available-quests:
