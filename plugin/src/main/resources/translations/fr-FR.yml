    button:
      quest:
        name: <!i><green>%QUESTNAME%
        lore:
        - <!i><gray>%QUESTDESCRIPTION%
      back:
        name: <!i><gray>Page précédente
      forward:
        name: <!i><gray>Page suivante
  quest-preview:
    title: <main>Prévisualisation de la quête
    button:
      info:
        name: <!i><green>%QUESTNAME%
        lore:
        - <!i><gray>%QUESTDESCRIPTION%
      accept:
        name: <!i><green>Accepter la quête
      decline:
        name: <!i><red>Refuser la quête
