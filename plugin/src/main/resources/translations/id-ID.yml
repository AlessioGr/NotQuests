    button:
      quests:
        name: <!i><green>%QUESTNAME%
        lore:
        - <!i><gray>%QUESTDESCRIPTION%
      back:
        name: <!i><gray>Halaman sebelumnya
      forward:
        name: <!i><gray>Halaman berikutnya
