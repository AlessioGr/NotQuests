      infobook:
        name: <!i><green>%QUESTNAME%
        lore:
        - <!i><gray>%QUESTDESCRIPTION%
      abort:
        name: <!i><red>Batalkan quest
        lore:
        - <!i><red>Klik untuk membatalkan quest
      back:
        name: <!i><red>Kembali ke halaman sebelumnya
