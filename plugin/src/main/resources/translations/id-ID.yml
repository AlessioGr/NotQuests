    button:
      questpoints:
        name: <!i><main>Poin Quest
        lore:
        - '<!i><gray>Poin quest kamu: <yellow>%QUESTPOINTS%'
      tab1:
        name: <!i><main>Quest aktif
        lore:
        - <!i><gray>Lihat quest aktif kamu
      tab2:
        name: <!i><main>Ambil quest baru
        lore:
        - <!i><gray>Lihat quest yang tersedia
  main-active:
