  reached-max-fails-limit: '<red>Bạn đã thất bại nhiệm vụ này quá nhiều lần rồi. Bạn thì thất bại đúng <highlight>%MAXFAILS%</highlight> lần thôi, nhưng bạn đã thất bại <highlight>%FAILEDAMOUNT%</highlight> lần rồi.'
