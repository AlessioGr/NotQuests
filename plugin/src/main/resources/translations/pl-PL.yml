  reached-max-fails-limit: '<red>Nie udało Ci się wykonać tego zadania za każdym razem. Możesz go nie wykonać tylko <highlight>%MAXFAILS%</highlight> razy, natomiast już nie udało Ci się <highlight>%FAILEDAMOUNT%</highlight> razy.'
  reached-max-completions-limit: '<red>Ukończyłeś to zadanie zbyt wiele razy. Możesz ukończyć tylko <highlight>%MAXCOMPLETIONS%</highlight> razy, ale już ukończyłeś <highlight>%COMPLETEDAMOUNT%</highlight> razy.'
