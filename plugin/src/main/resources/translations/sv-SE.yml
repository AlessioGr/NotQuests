  reached-max-fails-limit: <red>Du har redan misslyckats med detta uppdrag för många gånger. Du kan endast misslyckas med det <highlight>%MAXFAILS%</highlight> gånger, men du har redan misslyckats <highlight>%FAILEDAMOUNT%</highlight> gånger.
