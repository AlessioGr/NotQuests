      add: <highlight>+%QUESTPOINTSTOADD% <success>uppdragspoäng!
      remove: <highlight>-%QUESTPOINTSTOREMOVE% <negative>uppdragspoäng!
  no-quests-accepted: <error>Det verkar som att du inte har några aktiva uppdrag!
