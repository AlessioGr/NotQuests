    <CENTER><main>[Uppdrag accepterat]

    <CENTER><highlight><BOLD>%QUESTNAME%

    <EMPTY>

    '
  quest-description: '<main>Uppdragsbeskrivning: <unimportant>%QUESTDESCRIPTION%'
  quest-already-accepted: <error>Uppdraget är redan accepterat.
  quest-failed: '

    <CENTER><negative>[Uppdrag misslyckat]

    <CENTER><highlight><BOLD>%QUESTNAME%

    <EMPTY>

    '
  quest-aborted: ''
