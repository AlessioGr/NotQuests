    title: <main>Missão aceita
    subtitle: <highlight>%QUESTNAME%
  quest-completed:
    title: <positive>Missão Concluída
    subtitle: <highlight>%QUESTNAME%
  quest-failed:
    title: <negative>Missão Falhou
    subtitle: <highlight>%QUESTNAME%
placeholders:
  questcooldownleftformatted:
    prefix: ''
    minute: '1 minuto'
    minutes: '%MINUTES% minutos'
    hour: '1 hora'
    hours: '%HOURS% horas'
    day: '1 dia'
    days: '%DAYS% dias'
    no-cooldown: ''
gui:
  abort-quest-confirm:
    title: "<!i><red>Abort Quest <dark_gray>- <dark_red>Are you sure?"
    button:
      cancelabort:
        name: "<!i><red>Click to cancel"
        lore:
          - "<!i><gray>Cancels the abortion of the quest "
      confirmabort:
        name: "<!i><dark_red>Click to abort quest"
        lore:
          - "<!i><gray>Aborts the quest "
          - "<!i><dark_red>All progress will be lost!"
  active-quest-info:
    title: "<main>Questinfo <gray>- <green>%QUESTNAME%"
    button:
      infobook:
        name: "<!i><green>%QUESTNAME%"
        lore:
          - "<!i><gray>%QUESTDESCRIPTION%"
      abort:
        name: "<!i><red>Abort quest"
        lore:
          - "<!i><red>Click to abort quest"
      back:
        name: "<!i><red>Back to previous page"
  category-take:
    title: "<main>Take new quest"
    button:
      return:
        name: "<!i><red>Back"
      quests:
        name: "<!i><!i><green>%QUESTNAME%"
        lore:
          - "<!i><gray>%QUESTDESCRIPTION%"
      back:
        name: "<!i><gray>Previous page"
      forward:
        name: "<!i><gray>Next page"
  main-base:
    title: "<main>Questmenu"
    button:
      questpoints:
        name: "<!i><main>Questpoints"
        lore:
          - "<!i><gray>Your questpoints: <yellow>%QUESTPOINTS%"
      tab1:
        name: "<!i><main>Active quests"
        lore:
          - "<!i><gray>See your active quests"
      tab2:
        name: "<!i><main>Take a new quest"
        lore:
          - "<!i><gray>See available quests"
  main-active:
    title: "<main>Questmenu <gray>- <highlight>Active quests"
    button:
      quests:
        name: "<!i><green>%QUESTNAME%"
        lore:
          - "<!i><gray>%QUESTDESCRIPTION%"
      back:
        name: "<!i><gray>Previous page"
      forward:
        name: "<!i><gray>Next page"
  main-take:
    title: "<main>Questmenu <gray>- <highlight>Take a new quest"
    button:
      categories:
        name: "<!i><yellow>%CATEGORYNAME%"
        lore:
          - "<!i><gray>Click to view available"
          - "<!i><gray>quests in category"
      back:
        name: "<!i><gray>Previous page"
      forward:
        name: "<!i><gray>Next page"
  npc-available-quests:
    title: "<!i><main>Available quests"
    button:
      quest:
        name: "<!i><green>%QUESTNAME%"
        lore:
          - "<!i><gray>%QUESTDESCRIPTION%"
      back:
        name: "<!i><gray>Previous page"
      forward:
        name: "<!i><gray>Next page"
