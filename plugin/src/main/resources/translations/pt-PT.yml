gui:
  abort-quest-confirm:
    title: <!i><red>Abortar Missão <dark_gray>- <dark_red>Tem a certeza?
    button:
      cancelabort:
        name: <!i><red>Clique para cancelar
        lore:
        - '<!i><gray>Cancela o abortar da missão '
      confirmabort:
        name: <!i><dark_red>Clique para abortar a missão
        lore:
        - '<!i><gray>Aborta a missão '
        - <!i><dark_red>Todo o progresso será perdido!
  active-quest-info:
    title: <main>Info da missão <gray>- <green>%QUESTNAME%
    button:
      infobook:
        name: <!i><green>%QUESTNAME%
        lore:
        - <!i><gray>%QUESTDESCRIPTION%
      abort:
        name: <!i><red>Abortar missão
        lore:
        - <!i><red>Clique para abortar a missão
      back:
        name: <!i><red>Voltar à página anterior
  category-take:
    title: <main>Aceitar nova missão
    button:
      return:
        name: <!i><red>Voltar
      quests:
        name: <!i><!i><green>%QUESTNAME%
        lore:
        - <!i><gray>%QUESTDESCRIPTION%
      back:
        name: <!i><gray>Página anterior
      forward:
        name: <!i><gray>Página seguinte
  main-base:
    title: <main>Menu de missões
    button:
      questpoints:
        name: <!i><main>Pontos de Missão
        lore:
        - '<!i><gray>Os seus pontos de missão: <yellow>%QUESTPOINTS%'
      tab1:
        name: <!i><main>Missões ativas
        lore:
        - <!i><gray>Veja as suas missões ativas
      tab2:
        name: <!i><main>Aceitar uma nova missão
        lore:
        - <!i><gray>Veja as missões disponíveis
  main-active:
    title: <main>Menu de missões <gray>- <highlight>Missões ativas
    button:
      quests:
        name: <!i><green>%QUESTNAME%
        lore:
        - <!i><gray>%QUESTDESCRIPTION%
      back:
        name: <!i><gray>Página anterior
      forward:
        name: <!i><gray>Página seguinte
  main-take:
    title: <main>Menu de missões <gray>- <highlight>Aceitar uma nova missão
    button:
      categories:
        name: <!i><yellow>%CATEGORYNAME%
        lore:
        - <!i><gray>Clique para ver as missões
        - <!i><gray>disponíveis na categoria
      back:
        name: <!i><gray>Página anterior
      forward:
        name: <!i><gray>Página seguinte
  npc-available-quests:
    title: <!i><main>Missões disponíveis
    button:
      quest:
        name: <!i><green>%QUESTNAME%
        lore:
        - <!i><gray>%QUESTDESCRIPTION%
      back:
        name: <!i><gray>Página anterior
      forward:
        name: <!i><gray>Página seguinte
  quest-preview:
    title: <main>Visualização da missão
    button:
      info:
        name: <!i><green>%QUESTNAME%
        lore:
        - <!i><gray>%QUESTDESCRIPTION%
      accept:
        name: <!i><green>Aceitar missão
      decline:
        name: <!i><red>Recusar missão
