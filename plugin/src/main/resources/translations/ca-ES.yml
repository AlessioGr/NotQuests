    <CENTER><main>[Missió Acceptada]

    <CENTER><highlight><BOLD>%QUESTNAME%

    <EMPTY>

    '
  quest-description: '<main>Descripció de la missió: <unimportant>%QUESTDESCRIPTION%'
  quest-already-accepted: <error>Missió ja acceptada.
  quest-failed: '

    <CENTER><negative>[Missió Fallida]

    <CENTER><highlight><BOLD>%QUESTNAME%

    <EMPTY>

    '
  quest-aborted: ''
