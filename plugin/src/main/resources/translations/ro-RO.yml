      set: <main>Punctele tale de misiune au fost setate la <highlight>%NEWQUESTPOINTSAMOUNT%</highlight>.
      add: <highlight>+%QUESTPOINTSTOADD% <success>puncte de misiune!
      remove: <highlight>-%QUESTPOINTSTOREMOVE% <negative>puncte de misiune!
  no-quests-accepted: <error>Se pare că nu ai nicio misiune activă!
  quest-does-not-exist: <error>Misiunea <highlight>%QUESTNAME%</highlight> nu există!
  quest-not-found-or-does-not-exist: <error>Misiunea <highlight>%QUESTNAME%</highlight> nu a fost găsită sau nu este activă!
  active-quests-label: '<highlight>Misiuni active:'
  take-disabled: <error>Acceptarea sau previzualizarea misiunii <highlight>%QUESTNAME%</highlight> este dezactivată.
  abort-disabled: <error>Abandonarea misiunii <highlight>%QUESTNAME%</highlight> este dezactivată.
  quest-not-active-error: '<error>Eroare: <highlight>%QUESTNAME%</highlight> nu este o misiune activă!'
  force-add-active-quest-accepted: <success>Misiune acceptată cu succes (Forțat).
  add-active-quest-player-object-not-found: '<warn>Eroare: Obiectul jucătorului nu a fost găsit. Te rugăm să raportezi acest lucru dezvoltatorului plugin-ului.'
  reached-max-accepts-limit: <red>Ai acceptat deja această misiune de prea multe ori. O poți accepta doar de <highlight>%MAXACCEPTS%</highlight> ori, dar ai acceptat-o deja de <highlight>%ACCEPTEDAMOUNT%</highlight> ori.
  reached-max-fails-limit: <red>Ai eșuat deja această misiune de prea multe ori. O poți eșua doar de <highlight>%MAXFAILS%</highlight> ori, dar ai eșuat-o deja de <highlight>%FAILEDAMOUNT%</highlight> ori.
  reached-max-completions-limit: <red>Ai finalizat deja această misiune de prea multe ori. O poți finaliza doar de <highlight>%MAXCOMPLETIONS%</highlight> ori, dar ai finalizat-o deja de <highlight>%COMPLETEDAMOUNT%</highlight> ori.
  reached-max-active-quests-per-player-limit: <red>Nu poți accepta mai mult de <highlight>%MAXACTIVEQUESTSPERPLAYER%</highlight> misiuni.
  quest-on-cooldown:
    minute: <red>Această misiune este în așteptare! Trebuie să mai aștepți <highlight>1 minut</highlight> până o poți lua din nou.
