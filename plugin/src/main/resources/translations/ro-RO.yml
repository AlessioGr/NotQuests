    title: <!i><red>Abandonează misiunea <dark_gray>- <dark_red>Ești sigur?
    button:
      cancelabort:
        name: <!i><red>Apasă pentru a anula
        lore:
        - '<!i><gray>Anulează abandonarea misiunii '
      confirmabort:
        name: <!i><dark_red>Apasă pentru a abandona misiunea
        lore:
        - '<!i><gray>Abandonează misiunea '
        - <!i><dark_red>Tot progresul va fi pierdut!
  active-quest-info:
    title: <main>Info misiune <gray>- <green>%QUESTNAME%
    button:
      infobook:
        name: <!i><green>%QUESTNAME%
        lore:
        - <!i><gray>%QUESTDESCRIPTION%
      abort:
        name: <!i><red>Abandonează misiunea
        lore:
        - <!i><red>Apasă pentru a abandona misiunea
      back:
        name: <!i><red>Înapoi la pagina anterioară
  category-take:
    title: <main>Ia o misiune nouă
    button:
      return:
        name: <!i><red>Înapoi
      quests:
        name: <!i><!i><green>%QUESTNAME%
        lore:
        - <!i><gray>%QUESTDESCRIPTION%
      back:
        name: <!i><gray>Pagina anterioară
      forward:
        name: <!i><gray>Pagina următoare
  main-base:
    title: <main>Meniu misiuni
    button:
      questpoints:
        name: <!i><main>Puncte de misiune
        lore:
        - '<!i><gray>Punctele tale de misiune: <yellow>%QUESTPOINTS%'
      tab1:
        name: <!i><main>Misiuni active
        lore:
        - <!i><gray>Vezi misiunile tale active
      tab2:
        name: <!i><main>Ia o misiune nouă
        lore:
        - <!i><gray>Vezi misiunile disponibile
  main-active:
    title: <main>Meniu misiuni <gray>- <highlight>Misiuni active
    button:
      quests:
        name: <!i><green>%QUESTNAME%
        lore:
        - <!i><gray>%QUESTDESCRIPTION%
      back:
        name: <!i><gray>Pagina anterioară
      forward:
        name: <!i><gray>Pagina următoare
  main-take:
    title: <main>Meniu misiuni <gray>- <highlight>Ia o misiune nouă
    button:
      categories:
        name: <!i><yellow>%CATEGORYNAME%
        lore:
        - <!i><gray>Apasă pentru a vedea misiunile
        - <!i><gray>disponibile din categorie
      back:
        name: <!i><gray>Pagina anterioară
      forward:
        name: <!i><gray>Pagina următoare
  npc-available-quests:
    title: <!i><main>Misiuni disponibile
    button:
      quest:
        name: <!i><green>%QUESTNAME%
        lore:
        - <!i><gray>%QUESTDESCRIPTION%
      back:
        name: <!i><gray>Pagina anterioară
      forward:
        name: <!i><gray>Pagina următoare
  quest-preview:
