    prefix: ''
    minute: '1 minute'
    minutes: '%MINUTES% Minute'
    hour: '1 Oră'
    hours: '%HOURS% Ore'
    day: '1 zi'
    days: '%DAYS% Zile'
    no-cooldown: ''
gui:
