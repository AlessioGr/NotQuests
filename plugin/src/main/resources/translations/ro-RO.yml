    create-invalid-characters: <error>Numele de profil furnizat conține caractere nevalide.
    created-successfully: <success>Ai creat cu succes profilul <highlight>%NEWPROFILENAME%</highlight>! Pentru a comuta la el, folosește <highlight2>/nq profiles change %NEWPROFILENAME%</highlight2>
