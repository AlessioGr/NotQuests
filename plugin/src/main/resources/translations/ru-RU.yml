gui:
  abort-quest-confirm:
    title: <!i><red>Прервать квест <dark_gray>- <dark_red>Вы уверены?
    button:
      cancelabort:
        name: <!i><red>Нажмите, чтобы отменить
        lore:
        - '<!i><gray>Отменяет прерывание квеста '
      confirmabort:
        name: <!i><dark_red>Нажмите, чтобы прервать квест
        lore:
        - '<!i><gray>Прерывает квест '
        - <!i><dark_red>Весь прогресс будет потерян!
  active-quest-info:
    title: <main>Информация о квесте <gray>- <green>%QUESTNAME%
    button:
      infobook:
        name: <!i><green>%QUESTNAME%
        lore:
        - <!i><gray>%QUESTDESCRIPTION%
      abort:
        name: <!i><red>Прервать квест
        lore:
        - <!i><red>Нажмите, чтобы прервать квест
      back:
        name: <!i><red>Назад на предыдущую страницу
  category-take:
    title: <main>Взять новый квест
    button:
      return:
        name: <!i><red>Назад
      quests:
        name: <!i><!i><green>%QUESTNAME%
        lore:
        - <!i><gray>%QUESTDESCRIPTION%
      back:
        name: <!i><gray>Предыдущая страница
      forward:
        name: <!i><gray>Следующая страница
  main-base:
    title: <main>Меню квестов
    button:
      questpoints:
        name: <!i><main>Очки квестов
        lore:
        - '<!i><gray>Ваши очки квестов: <yellow>%QUESTPOINTS%'
      tab1:
        name: <!i><main>Активные квесты
        lore:
        - <!i><gray>Просмотреть активные квесты
      tab2:
        name: <!i><main>Взять новый квест
        lore:
        - <!i><gray>Просмотреть доступные квесты
  main-active:
    title: <main>Меню квестов <gray>- <highlight>Активные квесты
    button:
      quests:
        name: <!i><green>%QUESTNAME%
        lore:
        - <!i><gray>%QUESTDESCRIPTION%
      back:
        name: <!i><gray>Предыдущая страница
      forward:
        name: <!i><gray>Следующая страница
  main-take:
    title: <main>Меню квестов <gray>- <highlight>Взять новый квест
    button:
      categories:
        name: <!i><yellow>%CATEGORYNAME%
        lore:
        - <!i><gray>Нажмите, чтобы посмотреть доступные
        - <!i><gray>квесты в категории
      back:
        name: <!i><gray>Предыдущая страница
      forward:
        name: <!i><gray>Следующая страница
  npc-available-quests:
    title: <!i><main>Доступные квесты
    button:
      quest:
        name: <!i><green>%QUESTNAME%
        lore:
        - <!i><gray>%QUESTDESCRIPTION%
      back:
        name: <!i><gray>Предыдущая страница
      forward:
        name: <!i><gray>Следующая страница
  quest-preview:
