        base: 'Plukk opp gjenstander: <main>%ITEMTOPICKUPTYPE% %(%%ITEMTOPICKUPNAME%%)%'
      consumeItems:
        base: 'Forbruk gjenstander: <main>%ITEMTOCONSUMETYPE% %(%%ITEMTOCONSUMENAME%%)%'
      craftItems:
        base: 'Lag gjenstander: <main>%ITEMTOCRAFTTYPE% %(%%ITEMTOCRAFTNAME%%)%'
      deliverItems:
        base: 'Lever gjenstander: <main>%ITEMTODELIVERTYPE% %(%%ITEMTODELIVERNAME%%(%'
        deliver-to-npc: '      <GRAY>Lever det til <WHITE>%NPCNAME%'
        deliver-to-npc-not-available: '      <GRAY>Leverings-NPC-en er for øyeblikket ikke tilgjengelig!'
      enchant:
        base: 'Forheks gjenstander med %ENCHANTMENT%: <main>%ITEMTOENCHANTTYPE% %(%%ITEMTOENCHANTNAME%%(%'
