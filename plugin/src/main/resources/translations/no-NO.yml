    subtitle: <highlight>%QUESTNAME%
  quest-completed:
    title: <positive>Oppdrag fullført
    subtitle: <highlight>%QUESTNAME%
  quest-failed:
    title: <negative>Oppdrag mislyktes
    subtitle: <highlight>%QUESTNAME%
placeholders:
  questcooldownleftformatted:
    prefix: ''
    minute: 1 minutt
    minutes: '%MINUTES% minutter'
    hour: 1 time
    hours: '%HOURS% timer'
    day: 1 dag
    days: '%DAYS% dager'
    no-cooldown: ''
gui:
  abort-quest-confirm:
    title: <!i><red>Avbryt oppdrag <dark_gray>- <dark_red>Er du sikker?
    button:
      cancelabort:
        name: <!i><red>Klikk for å avbryte
        lore:
        - '<!i><gray>Avbryter avslutningen av oppdraget '
      confirmabort:
        name: <!i><dark_red>Klikk for å avbryte oppdrag
        lore:
        - '<!i><gray>Avbryter oppdraget '
        - <!i><dark_red>All fremdrift vil gå tapt!
  active-quest-info:
    title: <main>Oppdragsinfo <gray>- <green>%QUESTNAME%
    button:
      infobook:
        name: <!i><green>%QUESTNAME%
        lore:
        - <!i><gray>%QUESTDESCRIPTION%
      abort:
        name: <!i><red>Avbryt oppdrag
        lore:
        - <!i><red>Klikk for å avbryte oppdrag
      back:
        name: <!i><red>Tilbake til forrige side
  category-take:
    title: <main>Ta nytt oppdrag
    button:
      return:
        name: <!i><red>Tilbake
      quests:
        name: <!i><!i><green>%QUESTNAME%
        lore:
        - <!i><gray>%QUESTDESCRIPTION%
      back:
        name: <!i><gray>Forrige side
      forward:
        name: <!i><gray>Neste side
  main-base:
    title: <main>Oppdragsmeny
    button:
      questpoints:
        name: <!i><main>Oppdragspoeng
        lore:
        - '<!i><gray>Oppdragspoengene dine: <yellow>%QUESTPOINTS%'
      tab1:
        name: <!i><main>Aktive oppdrag
        lore:
        - <!i><gray>Se de aktive oppdragene dine
      tab2:
        name: <!i><main>Ta et nytt oppdrag
        lore:
        - <!i><gray>Se tilgjengelige oppdrag
  main-active:
    title: <main>Oppdragsmeny <gray>- <highlight>Aktive oppdrag
    button:
      quests:
        name: <!i><green>%QUESTNAME%
        lore:
        - <!i><gray>%QUESTDESCRIPTION%
      back:
        name: <!i><gray>Forrige side
      forward:
        name: <!i><gray>Neste side
  main-take:
    title: <main>Oppdragsmeny <gray>- <highlight>Ta et nytt oppdrag
    button:
      categories:
        name: <!i><yellow>%CATEGORYNAME%
        lore:
        - <!i><gray>Klikk for å se tilgjengelige
        - <!i><gray>oppdrag i kategorien
      back:
        name: <!i><gray>Forrige side
      forward:
        name: <!i><gray>Neste side
  npc-available-quests:
    title: <!i><main>Tilgjengelige oppdrag
    button:
      quest:
        name: <!i><green>%QUESTNAME%
        lore:
        - <!i><gray>%QUESTDESCRIPTION%
      back:
        name: <!i><gray>Forrige side
      forward:
        name: <!i><gray>Neste side
  quest-preview:
    title: <main>Forhåndsvisning av oppdrag
    button:
      info:
        name: <!i><green>%QUESTNAME%
        lore:
        - <!i><gray>%QUESTDESCRIPTION%
      accept:
        name: <!i><green>Aksepter oppdrag
      decline:
        name: <!i><red>Avslå oppdrag
