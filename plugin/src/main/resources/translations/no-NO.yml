        base: Nå jobbnivå <main>%AMOUNT%</main> med jobben <main>%JOBID%
  conditions:
    boolean:
      not-fulfilled: '<warn>Følgende må være %BOOLEANREQUIREMENT%: <highlight>%VARIABLESINGULAR%</highlight>.'
      variable-not-found: '<error>Feil: variabelen <highlight>%VARIABLENAME%</highlight> ble ikke funnet. Rapporter dette til servereieren.'
      wrong-operator: '<error>Feil: variabeloperatoren <highlight>%OPERATOR%/highlight> er ugyldig. Rapporter dette til servereieren.'
objective-tracking:
  actionbar-progress-update:
    default: <positive>%QUESTNAME%</positive> <unimportant>- <main>%OBJECTIVENAME%</main> <unimportant>(<positive>%ACTIVEOBJECTIVEPROGRESS% <unimportant>/ <main>%OBJECTIVEPROGRESSNEEDED% <unimportant>- <highlight>%OBJECTIVEPROGRESSPERCENTAGE%%<unimportant>)
