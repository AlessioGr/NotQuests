        base: 'Smelt gjenstander: <main>%ITEMTOSMELTTYPE% %(%%ITEMTOSMELTNAME%%)%'
      openBuriedTreasure:
        base: Åpne begravde skatter
      shearSheep:
        base: Klipp <main>%AMOUNTOFSHEEP%</main> sauer
      townyReachResidentCount:
        base: 'Nå antall innbyggere: <main>%AMOUNT%'
      townyNationReachTownCount:
        base: 'Nå antall byer med nasjonen din: <main>%AMOUNT%'
      jobsRebornReachJobLevel:
        base: Nå jobbnivå <main>%AMOUNT%</main> med jobben <main>%JOB%
      SlimefunResearch:
        base: Bruk på forskning
      ProjectKorraUseAbility:
        base: 'Bruk evne: <main>%ABILITY%'
      BetonQuestCompleteObjective:
        base: 'Fullfør mål: <main>%BETONQUESTOBJECTIVENAME%'
