---
chat:
  wrong-command-usage: <error>Feil kommandobruk!
  missing-permission: '<error>Ingen tillatelse! Påkrevd tillatelse: <highlight>%PERMISSION%'
  too-many-arguments: <error>For mange argumenter!
  quest-successfully-accepted: '

    <CENTER><main>[Oppdrag akseptert]

    <CENTER><highlight><BOLD>%QUESTNAME%

    <EMPTY>

    '
  quest-description: '<main>Oppdragsbeskrivelse: <unimportant>%QUESTDESCRIPTION%'
  quest-already-accepted: <error>Oppdraget er allerede akseptert.
  quest-failed: '

    <CENTER><negative>[Oppdrag mislyktes]

    <CENTER><highlight><BOLD>%QUESTNAME%

    <EMPTY>

    '
  quest-aborted: ''
  quest-completed-and-rewards-given: '

    <CENTER><positive>[Oppdrag fullført]

    <CENTER><highlight><BOLD>%QUESTNAME%

    <EMPTY>

    '
  quest-completed-rewards-prefix: '    <highlight>Belønninger:'
  quest-completed-rewards-rewardformat: '    <highlight> - <unimportant>%reward%'
  quest-completed-rewards-suffix: <EMPTY>
  quest-not-all-requirements-fulfilled: '<negative>Du oppfyller ikke alle kravene dette oppdraget trenger! Krav som fortsatt mangler:'
  action-not-all-conditions-fulfilled: '<negative>Du oppfyller ikke alle betingelsene denne handlingen trenger! Betingelser som fortsatt mangler:'
  missing-quest-description: <unimportant>Dette oppdraget har ingen oppdragsbeskrivelse.
  objectives-label-after-quest-accepting: '<highlight>Mål:'
  questpoints:
    query: <main>Du har for øyeblikket <highlight>%QUESTPOINTS%</highlight> oppdragspoeng.
    none: <error>Det ser ut til at du ikke har noen oppdragspoeng!
    notify-when-changed:
      set: <main>Oppdragspoengene dine er satt til <highlight>%NEWQUESTPOINTSAMOUNT%</highlight>.
      add: <highlight>+%QUESTPOINTSTOADD% <success>oppdragspoeng!
      remove: <highlight>-%QUESTPOINTSTOREMOVE% <negative>oppdragspoeng!
  no-quests-accepted: <error>Det ser ut til at du ikke har noen aktive oppdrag!
  quest-does-not-exist: <error>Oppdraget <highlight>%QUESTNAME%</highlight> finnes ikke!
  quest-not-found-or-does-not-exist: <error>Oppdraget <highlight>%QUESTNAME%</highlight> ble ikke funnet eller er ikke aktivt!
  active-quests-label: '<highlight>Aktive oppdrag:'
  take-disabled: <error>Å akseptere eller forhåndsvise oppdraget <highlight>%QUESTNAME%</highlight> er deaktivert.
  abort-disabled: <error>Å avbryte oppdraget <highlight>%QUESTNAME%</highlight> er deaktivert.
  quest-not-active-error: '<error>Feil: <highlight>%QUESTNAME%</highlight> er ikke et aktivt oppdrag!'
  force-add-active-quest-accepted: <success>Oppdraget ble akseptert (Tvunget).
  add-active-quest-player-object-not-found: '<warn>Feil: Spillerobjekt ikke funnet. Rapporter dette til plugin-utvikleren.'
  reached-max-accepts-limit: <red>Du har allerede akseptert dette oppdraget for mange ganger. Du kan bare akseptere det <highlight>%MAXACCEPTS%</highlight> ganger, men du har allerede akseptert det <highlight>%ACCEPTEDAMOUNT%</highlight> ganger.
  reached-max-fails-limit: <red>Du har allerede mislyktes med dette oppdraget for mange ganger. Du kan bare mislykkes med det <highlight>%MAXFAILS%</highlight> ganger, men du har allerede mislyktes med det <highlight>%FAILEDAMOUNT%</highlight> ganger.
  reached-max-completions-limit: <red>Du har allerede fullført dette oppdraget for mange ganger. Du kan bare fullføre det <highlight>%MAXCOMPLETIONS%</highlight> ganger, men du har allerede fullført det <highlight>%COMPLETEDAMOUNT%</highlight> ganger.
  reached-max-active-quests-per-player-limit: <red>Du kan ikke akseptere mer enn <highlight>%MAXACTIVEQUESTSPERPLAYER%</highlight> oppdrag.
  quest-on-cooldown:
    minute: <red>Dette oppdraget har nedkjøling! Du må vente <highlight>1 minutt</highlight> til før du kan ta det igjen.
    minutes: <red>Dette oppdraget har nedkjøling! Du må vente <highlight>%MINUTES% minutter</highlight> til før du kan ta det igjen.
    hour: <red>Dette oppdraget har nedkjøling! Du må vente <highlight>1 time</highlight> til før du kan ta det igjen.
    hours: <red>Dette oppdraget har nedkjøling! Du må vente <highlight>%HOURS% timer</highlight> til før du kan ta det igjen.
    day: <red>Dette oppdraget har nedkjøling! Du må vente <highlight>1 dag</highlight> til før du kan ta det igjen.
    days: <red>Dette oppdraget har nedkjøling! Du må vente <highlight>%DAYS% dager</highlight> til før du kan ta det igjen.
  profiles:
    list-current: '<highlight>Nåværende profil: <main>%PROFILENAME% (%QUESTPOINTS% oppdragspoeng)'
    list-other-heading: '<highlight>Andre profiler:'
    list-other-none: '  <main>Du har ingen flere profiler.'
    list-other: '  <highlight>- <main>%PROFILENAME% (%QUESTPOINTS% oppdragspoeng)'
    change-same-profile: <error>Du bruker allerede den profilen!
    change-profile-doesnt-exist: <error>Den profilen finnes ikke.
    changed-successfully: <success>Du har byttet profil fra %OLDPROFILENAME% til <highlight>%NEWPROFILENAME%</highlight>!
    create-already-exists: <error>En profil med navnet <highlight>%NEWPROFILENAME%</highlight> finnes allerede.
    create-invalid-characters: <error>Profilnavnet du oppga inneholder ugyldige tegn.
    created-successfully: <success>Du har opprettet profilen <highlight>%NEWPROFILENAME%</highlight>! For å bytte til den, bruk <highlight2>/nq profiles change %NEWPROFILENAME%</highlight2>
  conversations:
    choose-answer-prefix: '<EMPTY>

      <main>Velg svaret ditt:</main>'
    choose-answer-answer-hover-text: <highlight>Klikk for å svare
    ended-previous-conversation: <main>Du har avsluttet den forrige samtalen din!
    speaker-line-format: '%SPEAKERCOLOR%[%SPEAKER%] <GRAY>%MESSAGE%'
    answer-option-line-format: ' <main>%OPTIONNUMBER%. <gray>%MESSAGE%'
  objectives:
    counter: '<highlight>%OBJECTIVEIDWITHSUBID%.</highlight> <main>%OBJECTIVENAME%:'
    counterForObjectiveObjective: '<highlight>%OBJECTIVEIDWITHSUBID%.</highlight> <main>%OBJECTIVEHOLDERNAME%:'
    subObjectivePrefixAppend: '    '
    hidden: <highlight>%OBJECTIVEID%.</highlight> <unimportant><BOLD>[SKJULT]
    description: '    <veryUnimportant>└─ <unimportant>Beskrivelse: <main>%OBJECTIVEDESCRIPTION%'
    progress: '    <veryUnimportant>└─ <unimportant>Fremdrift: <main>%ACTIVEOBJECTIVEPROGRESS% / %OBJECTIVEPROGRESSNEEDED%'
    successfully-completed: '

      <CENTER><success>[Objective Completed]

      <CENTER><highlight><bold>%OBJECTIVENAME%</bold> <RESET><main>(%QUESTNAME%)

      <EMPTY>

      '
    successfully-completed-rewards-prefix: '    <highlight>Belønninger:'
    successfully-completed-rewards-rewardformat: '    <highlight> - <unimportant>%reward%'
    successfully-completed-rewards-suffix: <EMPTY>
