    create-invalid-characters: <error>Ime profila koje si uneo sadrži nevažeće znakove.
    created-successfully: <success>Uspešno si napravio profil <highlight>%NEWPROFILENAME%</highlight>! Da pređeš na njega, koristi <highlight2>/nq profiles change %NEWPROFILENAME%</highlight2>
